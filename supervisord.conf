[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1440x900x24 -ac +extension GLX +render -noreset
autorestart=true
priority=10
startsecs=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:xfce]
command=/bin/bash -c "sleep 4 && /usr/bin/startxfce4"
user=app
environment=HOME="/home/app",USER="app",DISPLAY=":1"
autorestart=true
priority=20
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:x11vnc]
command=/bin/bash -c "sleep 6 && until xdpyinfo -display :1 >/dev/null 2>&1; do sleep 1; done && /usr/bin/x11vnc -display :1 -forever -shared -rfbport 5900 -nopw -xkb"
autorestart=true
priority=30
startsecs=8
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:websockify]
command=/bin/bash -c "until (echo >/dev/tcp/localhost/5900) 2>/dev/null; do sleep 2; done && /bin/bash /opt/websockify/run 6080 localhost:5900"
autorestart=true
priority=40
startsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/bin/bash -c "until (echo >/dev/tcp/localhost/6080) 2>/dev/null; do sleep 2; done && /usr/sbin/nginx -g 'daemon off;'"
autorestart=true
priority=50
startsecs=12
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
